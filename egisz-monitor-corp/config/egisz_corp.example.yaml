# Copy to config/egisz_corp.yaml (or set EGISZ_CORP_CONFIG to absolute path).
# Flask config UI can write this file when CONFIG_WRITE_PATH points here.

firebird:
  host: "host.docker.internal"
  port: 3050
  database: "proxy_egisz"
  user: "SYSDBA"
  password: "masterkey"
  charset: "UTF8"
  page_size: 4096

postgres:
  host: "localhost"
  port: 5432
  database: "egisz_corp"
  user: "postgres"
  password: "postgres"
  schema: "public"

etl:
  batch_size: 500
  pipeline_name: "firebird_exchangelog"
  # KIND: only EGISZ_LICENSES (joined in default source_query via REPLYTO ↔ MO_DOMEN).
  # Incremental filter: LOGID > last_log_id from etl_state (not MODIFYDATE).
  sync_window_days: 30
  # If true, ignore etl_state and scan full window each run (heavy).
  full_scan: false
  # Optional override; default is EXCHANGELOG + EGISZ_MESSAGES (see etl.py).
  source_query: null

metabase:
  # Documentation only — Metabase reads the same postgres.* DSN.
  site_url: "http://localhost:3000"
